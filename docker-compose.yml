version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development  # Set any required environment variables here
    volumes:
      - ./backend:/app  # Bind mount for live code reloading
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
